<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px}
button{background:#e8ff3a;color:#000;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:900;margin:8px 0;cursor:pointer;width:100%;display:block}
#log{background:#222;border-radius:8px;padding:12px;margin-top:16px;font-size:13px;font-family:monospace;white-space:pre-wrap;min-height:150px}
</style>
</head>
<body>
<h2>Audio Test</h2>
<button id="b1">1. Fetch iTunes</button>
<button id="b2">2. Play Audio</button>
<button id="b3">3. Play Direct</button>
<div id="log">Ready. Tap a button.\n</div>
<audio id="au" playsinline></audio>
<script>
var previewUrl = null;
var au = document.getElementById('au');
var log = document.getElementById('log');

function L(msg) { log.textContent += '\n' + msg; }

document.getElementById('b1').addEventListener('click', function() {
  L('Fetching iTunes...');
  fetch('https://itunes.apple.com/search?term=queen&entity=song&limit=3')
    .then(function(r) { L('Status: ' + r.status); return r.json(); })
    .then(function(d) {
      L('Results: ' + d.resultCount);
      if (d.results && d.results[0]) {
        previewUrl = d.results[0].previewUrl;
        L('Preview URL: ' + (previewUrl ? previewUrl.slice(0,60) : 'NONE'));
      }
    })
    .catch(function(e) { L('FETCH ERROR: ' + e.message); });
});

document.getElementById('b2').addEventListener('click', function() {
  if (!previewUrl) { L('Run fetch first'); return; }
  L('Playing: ' + previewUrl.slice(0,50));
  au.src = previewUrl;
  au.volume = 1;
  au.play()
    .then(function() { L('SUCCESS - playing!'); })
    .catch(function(e) { L('PLAY ERROR: ' + e.name + ' ' + e.message); });
});

document.getElementById('b3').addEventListener('click', function() {
  L('Trying direct hardcoded URL...');
  au.src = 'https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview125/v4/6f/97/48/6f974853-1e48-a849-f3ed-4a9db34cc5e6/mzaf_12167461822497892.plus.aac.p.m4a';
  au.volume = 1;
  au.play()
    .then(function() { L('SUCCESS - direct URL works!'); })
    .catch(function(e) { L('DIRECT ERROR: ' + e.name + ' ' + e.message); });
});

L('Browser: ' + navigator.userAgent.slice(0, 100));
</script>
</body>
</html>
